apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-go-deployment
spec:
  replicas: 4 # no of pod copies
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%  # allow 25% pods unavailable during update
      maxSurge: 25%        # allow temporary scaling up
  selector:
    matchLabels:
      app: k8s-go
  template:
    metadata:
      labels:
        app: k8s-go
    spec:
      containers:
        - name: k8s-go
          image: yinebeb/k8s-go:1.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"   # 64*1024*1024 bytes
              cpu: "100m"  # 100 millicore
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: k8s-go-service
spec:
  type: LoadBalancer     # externally accessible
  selector:
    app: k8s-go          # matched pod labels
  ports:
    - protocol: TCP
      port: 80           # external port
      targetPort: 8080   # pod port
