apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-go-config
  labels:
    app: k8s-go
data:
  # App-level config tunable per env without rebuild.
  LOG_LEVEL: "info"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-go-deployment
  labels:
    app: k8s-go
spec:
  replicas: 4 # no of pod copies
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%  # allow 25% pods unavailable during update
      maxSurge: 25%        # allow temporary scaling up
  selector:
    matchLabels:
      app: k8s-go
  template:
    metadata:
      labels:
        app: k8s-go
    spec:
      containers:
        - name: k8s-go
          image: yinebeb/k8s-go:0.2
          imagePullPolicy: IfNotPresent
          # bulk-inject all ConfigMap keys as env vars
          envFrom:
            - configMapRef:
                name: k8s-go-config
          # single-key Secret mount (least-privilege).
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8s-go-secrets
                  key: API_TOKEN
          ports:
            # App binds to its default port (8080) — see main.go.
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "64Mi"   # 64*1024*1024 bytes
              cpu: "100m"  # 100 millicore
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 1
            failureThreshold: 1

---

apiVersion: v1
kind: Service
metadata:
  name: k8s-go-service
  labels:
    app: k8s-go
spec:
  type: LoadBalancer     # externally accessible
  selector:
    app: k8s-go          # matched pod labels
  ports:
    - protocol: TCP
      port: 80           # external port
      targetPort: http   # named pod port
