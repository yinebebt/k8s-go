# Two Services against the same pods so the LoadBalancer vs NodePort paths
# can be compared side by side. Both select pods via `app: k8s-go`.
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-go-service
  labels:
    app: k8s-go
spec:
  # LoadBalancer asks the cluster for an external IP.
  # Vanilla k8s ships no LB controller — on kind the IP comes from MetalLB
  # (see metallb-pool.yaml and README §Install MetalLB).
  type: LoadBalancer
  selector:
    app: k8s-go
  ports:
    - protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-go-nodeport
  labels:
    app: k8s-go
spec:
  # NodePort opens the same port on every node. Works without any LB controller.
  type: NodePort
  selector:
    app: k8s-go
  ports:
    - protocol: TCP
      port: 80
      targetPort: http
      nodePort: 30080
