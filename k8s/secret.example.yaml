# Template — copy to k8s/secret.yaml and replace the value.
# k8s/secret.yaml is gitignored; this file stays in version control.
apiVersion: v1
kind: Secret
metadata:
  name: k8s-go-secrets
  namespace: k8s-go
  labels:
    app: k8s-go
    app.kubernetes.io/name: k8s-go
    app.kubernetes.io/version: "0.2"
    app.kubernetes.io/part-of: k8s-go-demo
    app.kubernetes.io/managed-by: kubectl
type: Opaque
# stringData = plain text at apply time, k8s base64-encodes on store.
stringData:
  API_TOKEN: "replace-me"
