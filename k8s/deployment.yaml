apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-go-deployment
  labels:
    app: k8s-go
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: k8s-go
  template:
    metadata:
      labels:
        app: k8s-go
    spec:
      containers:
        - name: k8s-go
          # Tag pinned via kustomization.yaml `images.newTag`. Source kept
          # untagged so there's a single source of truth for version.
          image: yinebeb/k8s-go
          imagePullPolicy: IfNotPresent
          # bulk-inject all ConfigMap keys as env vars
          envFrom:
            - configMapRef:
                name: k8s-go-config
          # single-key Secret mount (least-privilege).
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8s-go-secrets
                  key: API_TOKEN
          ports:
            # App binds to its default port (8080) — see main.go.
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 1
            failureThreshold: 1
