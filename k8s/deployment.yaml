apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app-deployment
spec:
  replicas: 4 # no of pod copies
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%  # allow 25% pods unavailable during update
      maxSurge: 25%        # allow temporary scaling up
  selector:
    matchLabels:
      app: go-app
  template:
    metadata:
      labels:
        app: go-app
    spec:
      containers:
        - name: go-app
          image: yinebeb/go-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"   # 64*1024*1024 bytes
              cpu: "100m"  # 100 millicore
            limits:
              memory: "128Mi"
              cpu: "500m"
